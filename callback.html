<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>TikTok Auth Callback</title></head>
<body>
<h1>TikTok Authorization</h1>
<p id="status">Processing...</p>
<pre id="result"></pre>
<script>
const params = new URLSearchParams(window.location.search);
const code = params.get('code');
const error = params.get('error');
const state = params.get('state');

if (error) {
    document.getElementById('status').textContent = 'Error: ' + error;
} else if (code) {
    document.getElementById('status').textContent = 'Authorization code received! Copy this code and use it in the backend.';
    document.getElementById('result').textContent = 'Code: ' + code + '\nState: ' + state;
    
    // Try to send to local backend
    fetch('http://localhost:8001/api/tiktok/callback?code=' + encodeURIComponent(code) + '&state=' + encodeURIComponent(state || ''))
        .then(r => r.json())
        .then(data => {
            document.getElementById('status').textContent = 'Token saved successfully!';
            document.getElementById('result').textContent = JSON.stringify(data, null, 2);
        })
        .catch(e => {
            document.getElementById('status').textContent += ' (Auto-save failed, copy the code manually)';
        });
} else {
    document.getElementById('status').textContent = 'No authorization code received.';
}
</script>
</body>
</html>
